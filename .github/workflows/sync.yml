name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config user.email "manas.anupam7@gmail.com"
          git config user.name "manaskhuman"

          # Add upstream only if it doesn't exist
          git remote | grep upstream || git remote add upstream https://github.com/PeterAlaks/lyric-display-app.git

          git fetch upstream

          # Detect upstream default branch (main/master automatically)
          DEFAULT_BRANCH=$(git remote show upstream | grep "HEAD branch" | awk '{print $NF}')
          echo "Upstream default branch is $DEFAULT_BRANCH"

          # Checkout your fork's default branch
          git checkout $GITHUB_REF_NAME

          # Merge upstream default branch
          git merge upstream/$DEFAULT_BRANCH --no-edit || true

          # Push back to your fork
          git push origin $GITHUB_REF_NAME
