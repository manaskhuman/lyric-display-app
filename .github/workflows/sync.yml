name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config user.email "manas.anupam7@gmail.com"
          git config user.name "manaskhuman"

          git remote | grep upstream || git remote add upstream https://github.com/PeterAlaks/lyric-display-app.git

          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || true
          git push origin main
