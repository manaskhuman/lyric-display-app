name: Test Platform Builds

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python for native modules
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Audit server dependencies
        run: npm run audit:server

      - name: Rebuild native modules
        shell: powershell
        run: |
          npm rebuild better-sqlite3 --build-from-source
          npm rebuild keytar --build-from-source

      - name: Build renderer
        run: npm run build

      - name: Package Windows app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish never

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python for native modules
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Audit server dependencies
        run: npm run audit:server

      - name: Rebuild native modules
        run: |
          npm rebuild better-sqlite3 --build-from-source
          npm rebuild keytar --build-from-source

      - name: Build renderer
        run: npm run build

      - name: Package macOS app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python for native modules
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsecret-1-dev rpm libasound2-dev

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Audit server dependencies
        run: npm run audit:server

      - name: Rebuild native modules
        run: |
          npm rebuild better-sqlite3 --build-from-source
          npm rebuild keytar --build-from-source

      - name: Build renderer
        run: npm run build

      - name: Package Linux app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --linux --publish never
